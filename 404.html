<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página não encontrada | Romin.dev</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="romin-soft.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Verdana, Geneva, sans-serif;
            background-color: #FFFFFF;
            color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-box {
            width: 100%;
            max-width: 560px;
            border: 2px solid #000000;
            background-color: #F5F5F5;
            padding: 24px;
            text-align: center;
        }

        .error-code {
            font-family: "Courier New", monospace;
            font-size: 13px;
            color: #CC0000;
            margin-bottom: 10px;
        }

        h1 {
            font-family: "Times New Roman", serif;
            font-size: 34px;
            margin-bottom: 10px;
            color: #000000;
        }

        p {
            font-size: 14px;
            color: #444444;
            margin-bottom: 18px;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            font-size: 13px;
            text-decoration: none;
            border: 1px solid #000000;
            background-color: #FFFFFF;
            color: #000000;
            font-family: "Courier New", monospace;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: #000000;
            color: #FFFFFF;
        }

        .btn-primary {
            background-color: #CC0000;
            border-color: #990000;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background-color: #990000;
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <main class="error-box">
        <div class="error-code">ERRO 404</div>
        <h1>Página não encontrada</h1>
        <p>O endereço acessado não existe ou foi movido.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/">Voltar para início</a>
            <a class="btn" href="https://wa.me/5585981337203" target="_blank" rel="noopener noreferrer">Falar no WhatsApp</a>
        </div>
    </main>
</body>
</html>
